<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>JSON / JSONL Viewer</title>
<style>
  :root {
    --bg:#F0EEE6;            /* warm cream */
    --bg-soft:#F7F5EE;
    --panel:#FBFAF5;         /* card surface */
    --panel-soft:#F4F2EA;
    --fg:#1F1E1C;            /* warm near-black */
    --muted:#6E6A60;         /* warm secondary */
    --muted-2:#8E8979;
    --border:#DDD8C8;        /* soft warm divider */
    --border-soft:#E8E4D5;
    --chip:#EAE6D5;
    --accent:#CC785C;        /* terracotta */
    --accent-2:#B86545;
    --accent-soft:#F0D8C9;
    --ok:#3F7B58;
    --warn:#B17A3F;
    --err:#B8462E;
    --dirty:#C9803A;
    --sans: 'Inter','Söhne',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    --serif: 'Tiempos Headline','Source Serif Pro','Source Serif 4',Georgia,'Times New Roman',serif;
    --mono: 'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;

    /* Spacing scale */
    --s-1:4px; --s-2:6px; --s-3:8px; --s-4:12px; --s-5:16px; --s-6:20px; --s-7:24px; --s-8:32px;

    /* Type scale (line-height paired) */
    --fs-xs:11px;        --lh-xs:1.4;
    --fs-sm:12px;        --lh-sm:1.4;
    --fs-base:13px;      --lh-base:1.45;
    --fs-md:14px;        --lh-md:1.5;
    --fs-lg:15px;        --lh-lg:1.55;
    --fs-xl:18px;        --lh-xl:1.3;
    --fs-display:22px;   --lh-display:1.15;

    /* Radii */
    --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:14px; --r-pill:999px;

    /* Surfaces / elevation */
    --shadow-sm: 0 1px 2px rgba(31,30,28,.04);
    --shadow-md: 0 8px 28px -16px rgba(31,30,28,.18);
    --shadow-lg: 0 30px 80px -20px rgba(31,30,28,.4);
    --focus-ring: 0 0 0 3px var(--accent-soft);

    /* Backwards-compat aliases */
    --round:var(--r-md);
    --round-lg:var(--r-xl);
  }
  :root[data-theme="dark"]{
    --bg:#1E1B17; --bg-soft:#241F1A;
    --panel:#262420; --panel-soft:#2C2924;
    --fg:#E8E5DD; --muted:#A09B8E; --muted-2:#6E6A62;
    --border:#3A352E; --border-soft:#2F2A24; --chip:#312D27;
    --accent:#DA906F; --accent-2:#C97A55; --accent-soft:#4A3329;
    --ok:#6AAF85; --warn:#D9A465; --err:#E07F6A; --dirty:#D9A465;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme]){
      --bg:#1E1B17; --bg-soft:#241F1A;
      --panel:#262420; --panel-soft:#2C2924;
      --fg:#E8E5DD; --muted:#A09B8E; --muted-2:#6E6A62;
      --border:#3A352E; --border-soft:#2F2A24; --chip:#312D27;
      --accent:#DA906F; --accent-2:#C97A55; --accent-soft:#4A3329;
      --ok:#6AAF85; --warn:#D9A465; --err:#E07F6A; --dirty:#D9A465;
    }
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; background:var(--bg); color:var(--fg);
       font:var(--fs-md)/var(--lh-md) var(--sans);
       font-feature-settings:"ss01","cv11";
       -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale}
  .muted{color:var(--muted)}

  .visually-hidden{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }

  /* ---------- Scrollbars (themed, thin) ---------- */
  *{ scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{
    background:var(--border); border-radius:5px;
    border:2px solid transparent; background-clip:content-box;
    transition:background .12s;
  }
  ::-webkit-scrollbar-thumb:hover{ background:var(--muted-2); background-clip:content-box; }
  ::-webkit-scrollbar-corner{ background:transparent; }
  :root[data-theme="dark"] *{ scrollbar-color:var(--border) transparent; }

  /* ============================================================
     Component recipes (everything below references tokens above).
     Goal: one consistent visual system across all controls.
     ============================================================ */

  /* Header shell */
  body > header{
    position:sticky; top:0; z-index:100;
    background:color-mix(in oklab, var(--bg) 92%, transparent);
    backdrop-filter:saturate(140%) blur(8px);
    -webkit-backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid var(--border-soft);
  }
  .wrap{max-width:1240px; margin:0 auto; padding:var(--s-4) var(--s-7)}
  .row{display:flex; gap:var(--s-4); flex-wrap:wrap; align-items:center}
  .brand-row{display:flex; align-items:center; gap:var(--s-4); flex-wrap:wrap}
  .controls-row{margin-top:var(--s-3); padding-top:var(--s-3);
                border-top:1px solid var(--border-soft);
                display:flex; gap:var(--s-3); align-items:center; flex-wrap:wrap}
  .controls-row .divider{width:1px; align-self:stretch; background:var(--border-soft); margin:0 var(--s-1)}

  /* Display type */
  h1{font-family:var(--serif); font-weight:500; font-size:var(--fs-display); line-height:var(--lh-display);
     letter-spacing:-0.01em; margin:0; color:var(--fg)}
  h1 .accent-dot{display:inline-block; width:7px; height:7px; border-radius:var(--r-pill);
                 background:var(--accent); margin-right:var(--s-3); transform:translateY(-2px)}

  .controls{display:flex; gap:var(--s-3); align-items:center; flex-wrap:wrap}

  /* ---------- Buttons ----------
     One recipe with size + color modifiers. .btn is the canonical class;
     other historical classes (.file-btn, .mini-btn, .row-btn) inherit. */
  .btn, .file-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:var(--s-2);
    border:1px solid var(--border); background:var(--panel); color:var(--fg);
    padding:var(--s-3) var(--s-4); border-radius:var(--r-md); cursor:pointer;
    font:500 var(--fs-base)/1.2 var(--sans); letter-spacing:0;
    transition:background .15s, border-color .15s, color .15s, box-shadow .15s, transform .08s;
    white-space:nowrap; user-select:none;
  }
  .btn:hover, .file-btn:hover{background:var(--panel-soft); border-color:var(--muted-2)}
  .btn:focus-visible, .file-btn:focus-visible{outline:none; box-shadow:var(--focus-ring); border-color:var(--accent)}
  .btn:active, .file-btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5; cursor:not-allowed}
  .btn.primary{background:var(--accent); color:#FBFAF5; border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent-2); border-color:var(--accent-2)}
  .btn.ghost{background:transparent}
  .btn.ghost:hover{background:var(--panel-soft)}
  .btn.danger:hover{color:var(--err); border-color:color-mix(in oklab, var(--err) 40%, var(--border))}

  /* Compact button (tree row, card toolbar) */
  .mini-btn{
    display:inline-flex; align-items:center; gap:var(--s-1);
    padding:var(--s-2) var(--s-3); border-radius:var(--r-sm);
    border:1px solid transparent; background:transparent; color:var(--muted);
    font:500 var(--fs-sm)/1.2 var(--sans); cursor:pointer;
    transition:background .12s, color .12s, border-color .12s;
    white-space:nowrap;
  }
  .mini-btn:hover{color:var(--fg); background:var(--panel-soft); border-color:var(--border-soft)}
  .mini-btn:focus-visible{outline:none; box-shadow:var(--focus-ring); border-color:var(--accent)}
  .mini-btn.danger:hover{color:var(--err); background:color-mix(in oklab, var(--err) 8%, transparent); border-color:color-mix(in oklab, var(--err) 30%, transparent)}
  .mini-btn.warn:hover{color:var(--dirty); background:color-mix(in oklab, var(--dirty) 8%, transparent); border-color:color-mix(in oklab, var(--dirty) 30%, transparent)}
  .mini-btn.active{color:var(--accent); background:var(--accent-soft); border-color:var(--accent-soft)}
  .mini-btn.reset{display:none; color:var(--dirty); border-color:color-mix(in oklab, var(--dirty) 35%, transparent)}
  .card.dirty .mini-btn.reset{display:inline-flex}

  /* Inline row action (+/× in tree rows) */
  .row-btn{
    display:inline-flex; align-items:center; justify-content:center;
    padding:var(--s-1) var(--s-2); border-radius:var(--r-sm);
    border:1px solid transparent; background:transparent; color:var(--muted-2);
    font:500 var(--fs-xs)/1 var(--sans); cursor:pointer;
    transition:background .12s, color .12s, border-color .12s;
  }
  .row-btn:hover{color:var(--fg); background:var(--panel-soft); border-color:var(--border-soft)}
  .row-btn.del:hover{color:var(--err); background:color-mix(in oklab, var(--err) 10%, transparent); border-color:color-mix(in oklab, var(--err) 35%, transparent)}
  .row-btn.add:hover{color:var(--accent); background:var(--accent-soft); border-color:color-mix(in oklab, var(--accent) 35%, transparent)}

  /* Text-only link button */
  .btn-link{
    background:transparent; border:0; padding:0; cursor:pointer;
    color:var(--accent); font:500 var(--fs-sm)/1.2 var(--sans);
  }
  .btn-link:hover{color:var(--accent-2); text-decoration:underline}

  .file-input{display:none}

  /* ---------- Pills (chips, badges, key-chips) ---------- */
  .pill, .chip, .key-chip, .chip-stat, .dirty-badge{
    display:inline-flex; align-items:center; gap:var(--s-2);
    padding:var(--s-1) var(--s-3); border-radius:var(--r-pill);
    border:1px solid var(--border-soft); background:transparent; color:var(--muted);
    font:500 var(--fs-sm)/1.4 var(--sans); white-space:nowrap;
  }
  .chip-stat{font-family:var(--mono); font-size:var(--fs-xs); font-feature-settings:"tnum"; color:var(--muted)}
  .key-chip{cursor:pointer; color:var(--fg); transition:background .15s, border-color .15s}
  .key-chip:hover{background:var(--panel-soft); border-color:var(--muted-2)}
  .key-chip.selected{background:var(--accent-soft); border-color:var(--accent); color:var(--fg)}
  .key-chip .count{color:var(--muted-2); font:500 var(--fs-xs)/1.2 var(--mono); font-feature-settings:"tnum"}
  .key-chip.selected .count{color:var(--accent-2)}
  .dirty-badge{
    display:none;
    background:color-mix(in oklab, var(--dirty) 12%, transparent);
    border-color:color-mix(in oklab, var(--dirty) 40%, transparent);
    color:var(--dirty); font:500 var(--fs-sm)/1 var(--sans);
  }
  .dirty-badge.show{display:inline-flex}
  .dirty-badge .dot{width:7px; height:7px; border-radius:var(--r-pill); background:var(--dirty)}

  /* ---------- Status badges (inline, no border) ---------- */
  .status-badge, .badge-ok, .badge-err, .badge-excluded, .badge-dirty{
    font:600 var(--fs-xs)/1 var(--sans); text-transform:uppercase; letter-spacing:.05em;
    padding:var(--s-1) var(--s-2); border-radius:var(--r-sm);
  }
  .badge-ok{color:var(--ok); background:color-mix(in oklab, var(--ok) 10%, transparent)}
  .badge-err{color:var(--err); background:color-mix(in oklab, var(--err) 10%, transparent)}
  .badge-excluded{color:var(--warn); background:color-mix(in oklab, var(--warn) 10%, transparent)}
  .badge-dirty{display:none; align-items:center; gap:var(--s-1); color:var(--dirty); background:color-mix(in oklab, var(--dirty) 10%, transparent)}
  .card.dirty .badge-dirty{display:inline-flex}
  .badge-dirty .dot{width:6px; height:6px; border-radius:var(--r-pill); background:var(--dirty)}

  /* ---------- Toggle switch ---------- */
  .switch{
    display:inline-flex; align-items:center; gap:var(--s-3); user-select:none; cursor:pointer;
    padding:var(--s-2) var(--s-4); border:1px solid var(--border); border-radius:var(--r-pill);
    background:transparent; color:var(--muted);
    font:500 var(--fs-sm)/1.2 var(--sans);
    transition:color .15s, border-color .15s, background .15s;
  }
  .switch:hover{color:var(--fg); border-color:var(--muted-2)}
  .switch:has(input:checked){color:var(--fg); border-color:var(--accent-soft); background:color-mix(in oklab, var(--accent) 6%, transparent)}
  .switch input{
    appearance:none; width:30px; height:18px; border-radius:var(--r-pill);
    background:var(--border); position:relative; outline:none; transition:.2s; cursor:pointer; flex-shrink:0;
  }
  .switch input:checked{background:var(--accent)}
  .switch input::after{
    content:""; position:absolute; top:2px; left:2px; width:14px; height:14px;
    border-radius:var(--r-pill); background:#FBFAF5; transition:.2s;
    box-shadow:0 1px 3px rgba(0,0,0,.18);
  }
  .switch input:checked::after{left:14px}
  .switch:focus-within{box-shadow:var(--focus-ring); border-color:var(--accent)}

  /* ---------- Inputs (search / num / select / textarea) ---------- */
  .input, .search, .num-input, .select{
    border:1px solid var(--border); background:var(--panel); color:var(--fg);
    border-radius:var(--r-md); padding:var(--s-3) var(--s-4); outline:none;
    font:var(--fs-base)/1.3 var(--sans); transition:border-color .15s, box-shadow .15s;
  }
  .input:focus, .search:focus, .num-input:focus, .select:focus{
    border-color:var(--accent); box-shadow:var(--focus-ring);
  }
  .search{min-width:220px; flex:1 1 260px; padding:var(--s-3) var(--s-4); font-size:var(--fs-md)}
  .num-input{width:84px; padding:var(--s-2) var(--s-3); font-family:var(--mono); font-size:var(--fs-base); font-feature-settings:"tnum"}
  .select{padding:var(--s-2) var(--s-3); font-size:var(--fs-base); cursor:pointer}

  /* Pill that hosts an inline label + control */
  .control-group{
    display:inline-flex; align-items:center; gap:var(--s-2);
    padding:var(--s-1) var(--s-3); border:1px solid var(--border-soft);
    border-radius:var(--r-pill); background:transparent;
  }
  .control-group label{
    font:600 var(--fs-xs)/1 var(--sans); color:var(--muted);
    text-transform:uppercase; letter-spacing:.06em;
  }

  /* ---------- Panels (.side-section, .card, .modal share spacing) ---------- */
  .panel, .side-section{
    background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--r-xl);
    box-shadow:var(--shadow-sm);
  }
  /* Cards are flatter, denser — VS Code editor surface vibe */
  .card{
    background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--r-sm);
  }
  .side-title{
    font:600 var(--fs-xs)/1.2 var(--sans); text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted-2); margin:0 0 var(--s-3);
  }
  .side-keys{display:flex; flex-wrap:wrap; gap:var(--s-2)}
  .side-empty{color:var(--muted); font:var(--fs-base)/var(--lh-base) var(--sans)}

  /* ---------- Shell ---------- */
  .topbar{
    display:flex; align-items:center; gap:var(--s-3);
    padding:var(--s-3) var(--s-5);
    background:var(--panel); border-bottom:1px solid var(--border-soft);
    height:48px;
  }
  .topbar h1{font:500 var(--fs-lg)/1.2 var(--serif); margin:0; color:var(--fg)}
  .topbar .controls{display:flex; gap:var(--s-2); align-items:center}

  .shell{
    display:grid;
    grid-template-columns:48px 260px 1fr 280px;
    height:calc(100vh - 48px - 26px);  /* topbar 48 + status 26 */
    overflow:hidden;
  }

  .activity-bar{
    background:var(--panel-soft); border-right:1px solid var(--border-soft);
    display:flex; flex-direction:column; align-items:center; padding:var(--s-2) 0; gap:var(--s-1);
  }
  .act-btn{
    width:36px; height:36px; border-radius:var(--r-sm);
    display:flex; align-items:center; justify-content:center;
    background:transparent; border:none; cursor:pointer;
    color:var(--muted); font:var(--fs-md)/1 var(--sans);
    transition:background .12s, color .12s;
  }
  .act-btn:hover{background:var(--panel); color:var(--fg)}
  .act-btn.active{
    background:var(--panel); color:var(--accent);
    box-shadow:inset 2px 0 0 var(--accent);
  }
  /* Inline SVG icons */
  .icon{ width:18px; height:18px; display:block; flex-shrink:0; }
  .btn .icon, .file-btn .icon, .mini-btn .icon{ margin-right:var(--s-1); }
  .btn.ghost .icon{ margin-right:0; }
  .act-btn .icon{ width:20px; height:20px; }

  .side-bar{
    background:var(--panel); border-right:1px solid var(--border-soft);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .side-panel{display:none; flex:1; flex-direction:column; padding:var(--s-3); gap:var(--s-3); overflow:auto}
  .side-panel.active{display:flex}
  .side-panel-header{
    font:600 var(--fs-xs)/1.4 var(--sans); letter-spacing:0.08em;
    color:var(--muted); text-transform:uppercase;
    padding-bottom:var(--s-2); border-bottom:1px solid var(--border-soft);
  }
  .files-toolbar, .projects-toolbar{display:flex; gap:var(--s-2); margin-top:var(--s-2)}
  .search-controls{display:flex; flex-direction:column; gap:var(--s-3); margin-top:var(--s-3)}
  .search-controls .control-group{display:flex; flex-direction:column; gap:var(--s-1)}
  .search-controls label{color:var(--muted); font-size:var(--fs-sm)}
  /* Inside the side-panel column flex, inputs must NOT grow vertically. */
  .side-panel .search, .side-panel .num-input, .side-panel .select{
    flex:0 0 auto; width:100%;
  }
  .projects-list{display:flex; flex-direction:column; gap:var(--s-1); flex:1}
  .projects-list .pl-row{
    display:flex; align-items:center; gap:var(--s-2);
    padding:var(--s-2) var(--s-3); border-radius:var(--r-sm);
    cursor:pointer;
  }
  .projects-list .pl-row:hover{background:var(--panel-soft)}
  .projects-list .pl-row.active{background:var(--accent-soft); color:var(--accent)}
  .projects-list .pl-name{flex:1}
  .projects-list .pl-meta{color:var(--muted-2); font-size:var(--fs-sm)}

  .editor{display:flex; flex-direction:column; overflow:hidden; background:var(--bg)}
  .tab-strip{
    display:flex; align-items:stretch; flex-shrink:0;
    background:var(--panel-soft); border-bottom:1px solid var(--border-soft);
    height:34px; overflow-x:auto; overflow-y:hidden;
  }
  .tab-strip::-webkit-scrollbar{ height:0; }
  .tab-strip{ scrollbar-width:none; }
  .tab-strip:empty::before{content:"No file open"; color:var(--muted-2); font-size:var(--fs-sm); padding:var(--s-2) var(--s-4)}
  .tab-item{
    display:flex; align-items:center; gap:var(--s-2); flex-shrink:0;
    padding:0 var(--s-3);
    border-right:1px solid var(--border-soft);
    background:var(--panel-soft); color:var(--muted);
    cursor:pointer; font:var(--fs-sm)/1 var(--sans);
    white-space:nowrap;
  }
  .tab-item:hover{background:var(--panel)}
  .tab-item.active{background:var(--bg); color:var(--fg); border-bottom:2px solid var(--accent); margin-bottom:-1px}
  .tab-close{
    border:none; background:transparent; color:var(--muted-2);
    width:18px; height:18px; border-radius:var(--r-sm); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .tab-close:hover{background:var(--border-soft); color:var(--fg)}
  .tab-dirty-dot{width:6px; height:6px; border-radius:50%; background:var(--accent)}

  .editor-body{flex:1; overflow:auto; padding:var(--s-3) var(--s-4)}

  .schema-panel{
    background:var(--panel); border-left:1px solid var(--border-soft);
    padding:var(--s-3); overflow:auto;
    display:flex; flex-direction:column;
  }
  .schema-panel.hidden{display:none}

  .status-bar{
    position:fixed; bottom:0; left:0; right:0;
    height:26px; padding:0 var(--s-5);
    display:flex; align-items:center;
    background:var(--panel); border-top:1px solid var(--border-soft);
    font:var(--fs-sm)/1 var(--sans); color:var(--muted); z-index:50;
  }

  /* Hide schema column when toggled */
  .shell.schema-hidden{grid-template-columns:48px 260px 1fr}
  .shell.schema-hidden .schema-panel{display:none}

  /* Responsive: collapse side bar on small screens */
  @media (max-width: 800px){
    .shell{grid-template-columns:48px 1fr}
    .side-bar{position:fixed; top:48px; left:48px; bottom:26px; width:260px; z-index:40; box-shadow:var(--shadow-md)}
    .side-bar.collapsed{display:none}
    .schema-panel{display:none}
  }

  /* File tree (sits inside .side-section) */
  .file-tree{display:flex; flex-direction:column; gap:2px}
  .file-tree-empty{color:var(--muted-2); font:var(--fs-base)/var(--lh-base) var(--sans); padding:var(--s-1) 0}
  .folder-row{
    display:flex; align-items:center; gap:var(--s-2); padding:var(--s-2) var(--s-3);
    cursor:pointer; color:var(--muted);
    font:600 var(--fs-sm)/1.2 var(--sans); user-select:none;
    border-radius:var(--r-sm); transition:background .12s, color .12s;
  }
  .folder-row:hover{background:var(--panel-soft); color:var(--fg)}
  .folder-caret{
    display:inline-block; width:6px; height:6px;
    border-right:1.5px solid currentColor; border-bottom:1.5px solid currentColor;
    transform:rotate(-45deg); transition:transform .15s;
  }
  .folder-row.open .folder-caret{transform:rotate(45deg)}
  .folder-icon{font-size:var(--fs-base); opacity:.85}
  .folder-children{margin-left:var(--s-4); display:flex; flex-direction:column; gap:2px}
  .folder-children.collapsed{display:none}
  .file-row{
    display:flex; align-items:center; gap:var(--s-2); padding:var(--s-2) var(--s-3);
    cursor:pointer; border-radius:var(--r-sm); transition:background .12s; position:relative;
  }
  .file-row:hover{background:var(--panel-soft)}
  .file-row.active{background:var(--accent-soft)}
  .file-row.active .file-name{font-weight:600}
  .file-row.dirty::before{
    content:""; width:5px; height:5px; border-radius:var(--r-pill);
    background:var(--dirty); position:absolute; left:-1px; top:50%;
    transform:translateY(-50%);
  }
  .file-icon{flex-shrink:0; color:var(--muted-2); font:var(--fs-xs)/1 var(--mono)}
  .file-name{
    flex:1; min-width:0; font:500 var(--fs-sm)/1.3 var(--sans);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--fg);
  }
  .file-meta{
    font:500 var(--fs-xs)/1 var(--mono); color:var(--muted-2);
    flex-shrink:0; font-feature-settings:"tnum";
  }
  .file-close{
    flex-shrink:0; background:transparent; border:0; color:var(--muted-2);
    cursor:pointer; padding:1px var(--s-1); border-radius:var(--r-sm);
    opacity:0; transition:opacity .12s, color .12s, background .12s;
    font:var(--fs-base)/1 var(--sans);
  }
  .file-row:hover .file-close{opacity:1}
  .file-close:hover{color:var(--err); background:color-mix(in oklab, var(--err) 12%, transparent)}
  .files-toolbar{display:flex; gap:var(--s-2); flex-wrap:wrap; margin-top:var(--s-3)}
  .files-toolbar .mini-btn{flex:1 1 auto; justify-content:center; border-color:var(--border-soft)}
  .right-hint{
    font:var(--fs-xs)/var(--lh-xs) var(--sans); color:var(--muted-2);
    padding:var(--s-2) 0 0; border-top:1px dashed var(--border-soft); margin-top:var(--s-3);
  }

  /* ---------- Drop zone ---------- */
  .drop{
    border:1px dashed var(--border); background:var(--bg-soft);
    border-radius:var(--r-xl); padding:var(--s-7) var(--s-6);
    text-align:center; color:var(--muted); margin-bottom:var(--s-5); cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .drop:hover{border-color:var(--muted-2)}
  .drop.active{border-color:var(--accent); color:var(--fg); background:var(--accent-soft)}
  .drop strong{color:var(--fg); font-weight:600}
  .drop code{
    font:var(--fs-base) var(--mono); background:var(--chip);
    padding:1px var(--s-2); border-radius:var(--r-sm);
  }
  .drop.compact{padding:var(--s-3) var(--s-4); text-align:left}
  .drop.compact .drop-tips, .drop.compact .drop-sub{display:none}

  .add-row{display:flex; gap:var(--s-3); align-items:center; justify-content:center; margin-bottom:var(--s-4)}

  /* ---------- Cards ---------- */
  .list{display:flex; flex-direction:column; gap:var(--s-2)}
  .card{
    overflow:hidden; scroll-margin-top:120px;
    transition:opacity .12s, border-color .12s;
  }
  .card:hover{border-color:var(--muted-2)}
  .card.excluded{opacity:.45}
  .card.excluded .body{filter:grayscale(.6)}
  .card.active{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft), var(--shadow-md)}
  .card.dirty{border-left:3px solid var(--dirty)}
  .card.dirty.active{border-left:3px solid var(--accent)}
  .card header{position:relative; background:transparent; border:0; padding:0; backdrop-filter:none}
  .card-head{
    display:flex; align-items:center; justify-content:space-between;
    gap:var(--s-3); padding:var(--s-2) var(--s-3);
    border-bottom:1px solid var(--border-soft); flex-wrap:wrap;
  }
  .ln{font:500 var(--fs-sm)/1.2 var(--sans); color:var(--muted)}
  .ln strong{color:var(--fg); font-weight:600; font-size:var(--fs-base); margin-right:2px}
  .body{padding:var(--s-2) var(--s-3); overflow-x:auto}
  .toolbar{display:flex; gap:var(--s-2); align-items:center; flex-wrap:wrap}

  /* ---------- Footer / load more ---------- */
  .load-more{
    margin:var(--s-5) 0; display:flex; justify-content:center; gap:var(--s-3);
    align-items:center; color:var(--muted);
    font:var(--fs-base)/var(--lh-base) var(--sans); flex-wrap:wrap;
  }
  .footer{
    margin-top:var(--s-5); color:var(--muted);
    display:flex; gap:var(--s-3); flex-wrap:wrap; align-items:center; justify-content:space-between;
    font:var(--fs-sm)/var(--lh-sm) var(--sans);
  }
  .footer a{color:inherit; text-decoration:none; border-bottom:1px solid transparent}
  .footer a:hover{color:var(--accent); border-bottom-color:var(--accent)}

  /* ---------- Keyboard hints ---------- */
  .kbd-hint{font:var(--fs-sm)/1.6 var(--sans); color:var(--muted)}
  .kbd-hint > div{margin-bottom:var(--s-1)}
  .kbd-hint kbd{
    display:inline-block; padding:2px var(--s-2); border:1px solid var(--border-soft);
    border-radius:var(--r-sm); background:var(--bg-soft);
    font:var(--fs-xs) var(--mono); color:var(--fg); margin:0 1px;
  }

  /* ---------- Tree view (VS Code-style: dense, monospace) ---------- */
  .tree{font:var(--fs-sm)/1.5 var(--mono)}
  .kv{display:flex; align-items:flex-start; gap:var(--s-1); position:relative; padding:0}
  .row-actions{display:none; gap:var(--s-1); margin-left:var(--s-3); align-items:center}
  body.edit-on .kv:hover > .row-actions,
  body.edit-on details.tree-node > summary:hover .row-actions{display:inline-flex}
  /* Tree token colors — high-contrast warm palette */
  :root{
    --tok-key:#205070;       /* deep teal-blue */
    --tok-idx:#705416;       /* deep ochre */
    --tok-pun:#5C5648;       /* dark warm gray (punctuation) */
    --tok-str:#7A3D14;       /* deep terracotta-brown */
    --tok-num:#2F5A38;       /* deep green */
    --tok-bool:#52327E;      /* deep purple */
    --tok-nil:#6E5C44;       /* warm brown */
  }
  :root[data-theme="dark"]{
    --tok-key:#B6D5EA;
    --tok-idx:#EDD499;
    --tok-pun:#9C9483;
    --tok-str:#F0BC8E;
    --tok-num:#ABDAB1;
    --tok-bool:#DAB8F1;
    --tok-nil:#C2B49D;
  }
  .key{color:var(--tok-key)}
  .idx{color:var(--tok-idx); font-weight:500}
  .pun{color:var(--tok-pun)}
  .str{color:var(--tok-str); white-space:pre-wrap; word-break:break-word}
  .num{color:var(--tok-num); font-feature-settings:"tnum"}
  .bool{color:var(--tok-bool)}
  .nil{color:var(--tok-nil); font-style:italic}
  body.edit-on .editable{cursor:text}
  body.edit-on .editable:hover{outline:1px dashed var(--accent); outline-offset:2px; border-radius:3px}
  details.tree-node{margin-left:0}
  details.tree-node>summary{list-style:none; cursor:pointer; display:inline-flex; align-items:baseline; gap:var(--s-1)}
  details.tree-node>summary::-webkit-details-marker{display:none}
  .caret{
    display:inline-block; width:6px; height:6px;
    border-right:1.5px solid var(--muted); border-bottom:1.5px solid var(--muted);
    transform:rotate(-45deg) translateY(-1px); transition:transform .12s; margin-right:var(--s-1);
  }
  details[open] > summary .caret{transform:rotate(45deg) translateY(-2px); border-color:var(--fg)}
  .children{margin-left:var(--s-3); border-left:1px solid var(--border-soft); padding-left:var(--s-2); margin-top:0}
  .node-head{color:var(--muted-2)}
  .node-meta{color:var(--muted-2); font-style:italic; font-size:.92em}
  details.tree-node[open] > summary .node-meta,
  details.tree-node[open] > summary .pun-close{display:none}

  /* ---------- Inline edit input ----------
     Goal: minimal layout shift. Match the parent span's font; no border,
     no padding, only an outline (doesn't affect flow). */
  .edit-input{
    font:inherit;
    padding:1px 4px; margin:-1px -4px;     /* cancel padding via negative margin */
    border:none; border-radius:3px;
    outline:1.5px solid var(--accent); outline-offset:0;
    background:color-mix(in oklab, var(--accent) 8%, var(--panel));
    color:var(--fg); min-width:40px;
    vertical-align:baseline; box-sizing:content-box;
  }
  input.edit-input{ display:inline-block; width:auto; }
  textarea.edit-input{
    display:inline-block; width:auto; min-width:200px; max-width:100%;
    resize:none; vertical-align:top;
    white-space:pre-wrap; word-break:break-word;
    overflow-y:hidden;
  }
  select.edit-input{ padding:0 4px; margin:-1px -4px; }

  /* ---------- Raw editor (full-card JSON edit) ---------- */
  .raw-editor{display:flex; flex-direction:column; gap:var(--s-3)}
  .raw-editor textarea{
    width:100%; min-height:220px; resize:vertical;
    font:var(--fs-base)/var(--lh-lg) var(--mono);
    padding:var(--s-4) var(--s-5); border-radius:var(--r-md); border:1px solid var(--border);
    background:var(--bg-soft); color:var(--fg); outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .raw-editor textarea:focus{border-color:var(--accent); box-shadow:var(--focus-ring)}
  .raw-editor textarea.error{border-color:var(--err); box-shadow:0 0 0 3px color-mix(in oklab, var(--err) 18%, transparent)}
  .raw-editor-bar{display:flex; gap:var(--s-3); align-items:center; flex-wrap:wrap}
  .raw-error{color:var(--err); font:500 var(--fs-sm)/1.4 var(--sans); flex:1}
  .raw-error.ok{color:var(--ok)}

  /* ---------- Chat view ---------- */
  .chat-view{display:grid; gap:var(--s-4)}
  .chat-turn{
    border:1px solid var(--border-soft); border-radius:var(--r-lg); overflow:hidden;
    background:var(--bg-soft);
  }
  .chat-role{
    padding:var(--s-3) var(--s-5); background:transparent;
    font:600 var(--fs-xs)/1.2 var(--sans); text-transform:uppercase; letter-spacing:.08em;
    border-bottom:1px solid var(--border-soft); color:var(--muted);
  }
  .chat-role.role-user{color:var(--accent)}
  .chat-role.role-assistant{color:var(--ok)}
  .chat-role.role-system{color:var(--warn)}
  .chat-role.role-tool, .chat-role.role-function{color:var(--tok-bool)}
  .chat-content{
    padding:var(--s-4) var(--s-5); white-space:pre-wrap; word-break:break-word;
    font:var(--fs-base)/var(--lh-lg) var(--mono);
  }

  /* ---------- Markdown renderer ---------- */
  .md-render{font:var(--fs-md)/var(--lh-lg) var(--sans); white-space:normal; color:var(--fg)}
  .md-render p{margin:.4em 0}
  .md-render h1, .md-render h2, .md-render h3,
  .md-render h4, .md-render h5, .md-render h6{
    font-family:var(--serif); font-weight:500; line-height:1.2;
    margin:.7em 0 .35em; letter-spacing:-.005em;
  }
  .md-render h1{font-size:1.45em} .md-render h2{font-size:1.28em}
  .md-render h3{font-size:1.14em} .md-render h4{font-size:1em}
  .md-render h5{font-size:.95em} .md-render h6{font-size:.9em; color:var(--muted)}
  .md-render ul, .md-render ol{margin:.35em 0; padding-left:1.4em}
  .md-render li{margin:.15em 0}
  .md-render code{
    font:.92em var(--mono); background:var(--chip);
    padding:1px var(--s-2); border-radius:var(--r-sm);
  }
  .md-render pre{
    background:var(--chip); border:1px solid var(--border-soft);
    padding:var(--s-3) var(--s-4); border-radius:var(--r-md); overflow-x:auto;
    margin:.5em 0; font:var(--fs-base)/var(--lh-lg) var(--mono);
  }
  .md-render pre code{background:transparent; padding:0; border-radius:0; font-family:inherit; font-size:1em}
  .md-render blockquote{
    margin:.5em 0; padding:.2em 1em; border-left:3px solid var(--accent-soft);
    color:var(--muted); font-style:italic;
  }
  .md-render a{color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent-soft)}
  .md-render a:hover{border-bottom-color:var(--accent)}
  .md-render hr{border:0; border-top:1px solid var(--border-soft); margin:.8em 0}
  .md-render strong{font-weight:600}
  .md-render em{font-style:italic}
  .str.has-md{white-space:normal}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; top:var(--s-5); right:var(--s-5); z-index:50;
    background:var(--panel); color:var(--fg); border:1px solid var(--border-soft);
    border-radius:var(--r-md); padding:var(--s-3) var(--s-4); box-shadow:var(--shadow-md);
    font:var(--fs-base)/1.3 var(--sans);
    display:none; max-width:360px;
  }
  .toast.show{display:block; animation:fade 2.4s ease-in-out}
  .toast.err{border-color:color-mix(in oklab, var(--err) 50%, var(--border)); color:var(--err)}
  @keyframes fade{
    0%{opacity:0; transform:translateY(-6px)}
    8%{opacity:1; transform:translateY(0)}
    85%{opacity:1}
    100%{opacity:0}
  }

  /* ---------- Modal ---------- */
  .modal-bg{
    position:fixed; inset:0; background:rgba(31,30,28,.5); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:var(--s-6);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
  }
  .modal{
    background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--r-xl);
    padding:var(--s-6) var(--s-7); max-width:440px; width:100%;
    box-shadow:var(--shadow-lg);
  }
  .modal h3{
    margin:0 0 var(--s-3); letter-spacing:-.01em;
    font:500 var(--fs-xl)/1.2 var(--serif);
  }
  .modal p{
    margin:0 0 var(--s-5); color:var(--muted);
    font:var(--fs-md)/1.5 var(--sans);
  }
  .modal-actions{display:flex; gap:var(--s-3); justify-content:flex-end}

  .project-chip{
    border:1px solid var(--border); background:var(--panel); color:var(--fg);
    padding:var(--s-2) var(--s-3); border-radius:var(--r-md);
    font:500 var(--fs-base)/1.2 var(--sans); cursor:pointer;
  }
  .project-chip:hover{background:var(--panel-soft); border-color:var(--muted-2)}
  .project-popup{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--r-md);
    box-shadow:var(--shadow-md); padding:var(--s-2); z-index:200;
    min-width:240px;
  }
  .pp-row{display:flex; align-items:center; gap:var(--s-2); padding:var(--s-2) var(--s-3); border-radius:var(--r-sm); cursor:pointer}
  .pp-row:hover{background:var(--panel-soft)}
  .pp-row.active{color:var(--accent)}
  .pp-check{width:14px; display:inline-block}
  .pp-name{flex:1}
  .pp-meta{color:var(--muted-2); font-size:var(--fs-sm)}
  .pp-divider{height:1px; background:var(--border-soft); margin:var(--s-2) 0}
  .pp-action{
    display:block; width:100%; text-align:left; padding:var(--s-2) var(--s-3);
    background:transparent; border:none; color:var(--fg); cursor:pointer;
    border-radius:var(--r-sm); font:500 var(--fs-base)/1.2 var(--sans);
  }
  .pp-action:hover{background:var(--panel-soft)}
  .manage-list{display:flex; flex-direction:column; gap:var(--s-2); max-height:60vh; overflow:auto}
  .manage-row{display:flex; align-items:center; gap:var(--s-3); padding:var(--s-3); border:1px solid var(--border-soft); border-radius:var(--r-md)}
  .manage-row.active{border-color:var(--accent); background:var(--accent-soft)}
  .mr-name{flex:1; font-weight:500}
  .mr-meta{color:var(--muted); font-size:var(--fs-sm)}
  .mr-btns{display:flex; gap:var(--s-2)}
  .modal-input{width:100%; padding:var(--s-3); border:1px solid var(--border); border-radius:var(--r-sm); margin-top:var(--s-2)}

  /* ---------- Command Palette / Quick Open ---------- */
  .palette-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.3);
    display:flex; justify-content:center; align-items:flex-start;
    padding-top:10vh; z-index:300;
  }
  .palette-box{
    width:min(560px, 90vw); background:var(--panel);
    border:1px solid var(--border); border-radius:var(--r-md);
    box-shadow:var(--shadow-lg); overflow:hidden;
  }
  .palette-input{
    width:100%; padding:var(--s-4) var(--s-5);
    border:none; outline:none; background:transparent; color:var(--fg);
    font:var(--fs-md)/var(--lh-md) var(--sans);
    border-bottom:1px solid var(--border-soft);
  }
  .palette-list{max-height:60vh; overflow:auto}
  .palette-row{
    display:flex; align-items:center; gap:var(--s-3);
    padding:var(--s-2) var(--s-5); cursor:pointer;
    font:var(--fs-base)/var(--lh-base) var(--sans);
  }
  .palette-row:hover{background:var(--panel-soft)}
  .palette-row.selected{background:var(--accent-soft); color:var(--accent)}
  .palette-label{flex:1}
  .palette-hint{color:var(--muted-2); font-size:var(--fs-sm)}

  /* ---------- Settings form ---------- */
  .settings-form{display:flex; flex-direction:column; gap:var(--s-5)}
  .settings-row{display:flex; flex-direction:column; gap:var(--s-2)}
  .settings-help{color:var(--muted); font-size:var(--fs-sm)}
</style>
</head>
<body>
  <header class="topbar">
    <h1><span class="accent-dot"></span>JSONL Viewer</h1>
    <button class="chip project-chip" id="projectChip" title="Switch project">Untitled &#x25BE;</button>
    <span class="chip" id="stats">No file loaded</span>
    <span class="dirty-badge" id="dirtyBadge"><span class="dot"></span><span id="dirtyCount">0 modified</span></span>
    <div style="flex:1"></div>
    <div class="controls">
      <button class="btn ghost" id="settingsBtn" title="Settings" aria-label="Settings">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <label class="file-btn" title="Open file(s)">
        Open
        <input class="file-input" id="fileInput" type="file" multiple accept=".jsonl,.json,.txt,.log" />
      </label>
      <button class="btn" id="exportBtn" title="Export visible items as JSONL">Export</button>
      <button class="btn primary" id="saveBtn" title="Save (Ctrl+S)">Save</button>
    </div>
  </header>

  <div class="shell">
    <!-- Activity bar -->
    <nav class="activity-bar" id="activityBar">
      <button class="act-btn active" data-panel="files" title="Files (Ctrl+B)" aria-label="Files">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h4l2 2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
      </button>
      <button class="act-btn" data-panel="projects" title="Projects" aria-label="Projects">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 17a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2l2 2h6a2 2 0 0 1 2 2z"/><path d="M2 8v11a2 2 0 0 0 2 2h14"/></svg>
      </button>
      <button class="act-btn" data-panel="search" title="Search" aria-label="Search">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="act-btn" data-panel="settings" title="Settings" aria-label="Settings">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div style="flex:1"></div>
      <button class="act-btn" data-panel="schema" title="Schema (toggle right panel)" aria-label="Schema">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5a2 2 0 0 0 2 2h1"/><path d="M16 21h1a2 2 0 0 0 2-2v-5a2 2 0 0 1 2-2 2 2 0 0 1-2-2V5a2 2 0 0 0-2-2h-1"/></svg>
      </button>
    </nav>

    <!-- Side bar — panels switch by activity -->
    <aside class="side-bar" id="sideBar">

      <!-- Files panel -->
      <div class="side-panel active" data-panel="files">
        <div class="side-panel-header">EXPLORER</div>
        <div class="file-tree" id="fileTree">
          <div class="file-tree-empty">No files open. Drop or open.</div>
        </div>
        <div class="files-toolbar">
          <button class="mini-btn" id="addFilesBtn" title="Open files">+ Files</button>
          <button class="mini-btn" id="addFolderBtn" title="Open folder">+ Folder</button>
        </div>
        <input class="file-input" id="filesInput" type="file" multiple accept=".jsonl,.json,.txt,.log" />
        <input class="file-input" id="folderInput" type="file" webkitdirectory directory />
      </div>

      <!-- Projects panel -->
      <div class="side-panel" data-panel="projects">
        <div class="side-panel-header">PROJECTS</div>
        <div class="projects-list" id="projectsList">Loading&#x2026;</div>
        <div class="projects-toolbar">
          <button class="mini-btn" id="newProjectBtn" title="New project">+ New</button>
          <button class="mini-btn" id="manageProjectsBtn" title="Manage projects">Manage&#x2026;</button>
        </div>
      </div>

      <!-- Search panel -->
      <div class="side-panel" data-panel="search">
        <div class="side-panel-header">SEARCH</div>
        <input id="search" class="search" type="search" placeholder="Filter (text match) &#x2014; / to focus" />
        <div class="search-controls">
          <div class="control-group">
            <label for="sortSel">Sort</label>
            <select class="select" id="sortSel">
              <option value="default">file order</option>
              <option value="tokens-desc">tokens &darr;</option>
              <option value="tokens-asc">tokens &uarr;</option>
              <option value="chars-desc">chars &darr;</option>
              <option value="chars-asc">chars &uarr;</option>
            </select>
          </div>
          <div class="control-group">
            <label>Tokens range</label>
            <div style="display:flex; gap:6px">
              <input class="num-input" id="minTokens" type="number" min="0" placeholder="min" />
              <input class="num-input" id="maxTokens" type="number" min="0" placeholder="max" />
            </div>
          </div>
          <div class="control-group" style="flex-direction:row; gap:6px">
            <button class="mini-btn" id="treeToggle" title="Expand / collapse all (E / C)">Expand all</button>
          </div>
          <button class="visually-hidden" id="expandAll" aria-hidden="true" tabindex="-1"></button>
          <button class="visually-hidden" id="collapseAll" aria-hidden="true" tabindex="-1"></button>
        </div>
      </div>

      <!-- Settings panel -->
      <div class="side-panel" data-panel="settings">
        <div class="side-panel-header">SETTINGS</div>
        <label class="switch" title="Render \n as real line breaks">
          <input id="nlToggle" type="checkbox" checked />
          <span>Newlines</span>
        </label>
        <label class="switch" title="Render string values as Markdown">
          <input id="mdToggle" type="checkbox" />
          <span>Markdown</span>
        </label>
        <label class="switch" title="Edit mode (+ / × hovers)">
          <input id="editToggle" type="checkbox" />
          <span>Edit mode</span>
        </label>
        <label class="switch" title="Click value=copy; click key=copy key; Alt+click=copy path">
          <input id="quickCopyToggle" type="checkbox" />
          <span>Quick Copy</span>
        </label>
        <label class="switch" title="Color-code key names">
          <input id="colorizeToggle" type="checkbox" checked />
          <span>Colorize keys</span>
        </label>
        <label class="switch" title="Dark theme">
          <input id="themeToggle" type="checkbox" />
          <span>Dark mode</span>
        </label>
        <div style="margin-top:12px">
          <button class="mini-btn" id="openSettingsModalBtn">Advanced settings&#x2026;</button>
        </div>
      </div>
    </aside>

    <!-- Editor area -->
    <main class="editor">
      <div class="tab-strip" id="tabStrip"></div>
      <div class="editor-body">
        <div id="drop" class="drop">
          <div class="drop-main"><strong>Drag &amp; drop</strong> a <code>.json</code> or <code>.jsonl</code> file here, or click <em>Open</em>.</div>
          <div class="drop-sub muted" style="margin-top:4px">
            JSON arrays &#x2192; cards. JSONL &#x2192; cards per line.
          </div>
        </div>
        <div class="add-row" id="addRow" style="display:none">
          <button class="btn ghost" id="addItemBtn" title="Append a new blank item">+ New item</button>
        </div>
        <div class="list" id="list"></div>
        <div class="load-more" id="loadMore"></div>
        <div class="footer" id="footer">
          <span id="filterInfo"></span>
          <span class="credit">By <a href="https://github.com/ibndias" target="_blank" rel="noopener">ibndias</a></span>
        </div>
      </div>
    </main>

    <!-- Schema panel -->
    <aside class="schema-panel" id="sidebar">
      <div class="side-panel-header">SCHEMA</div>
      <div class="side-keys" id="schemaKeys">
        <div class="side-empty">Load a file to see keys.</div>
      </div>
      <div class="side-section" id="sideActions" style="display:none">
        <button class="btn-link" id="clearKeysBtn">clear key filters</button>
      </div>
    </aside>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <!-- Modal (unchanged) -->
  <div id="modal" class="modal-bg" style="display:none">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modalTitle">Confirm</h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="modalCancel">Cancel</button>
        <button class="btn primary" id="modalOk">OK</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script type="module" src="js/main.js?v=p8"></script>
</body>
</html>
